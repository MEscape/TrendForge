services:
  postgres:
    image: postgres:16-alpine
    container_name: trendforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trendforge
      POSTGRES_PASSWORD: trendforge
      POSTGRES_DB: trendforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trendforge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

